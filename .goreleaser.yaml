version: 2

project_name: resumer

builds:
  - main: .
    binary: resumer
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - formats: [tar.gz]
    name_template: "resumer_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

homebrew_casks:
  - repository:
      owner: jin-ttao
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: https://github.com/jin-ttao/resumer
    description: "Browse & resume your Claude Code / Codex sessions"
    # Old 0.1.1 installs used the Python formula in Formula/resumer.rb; the
    # cask replaces it. Release notes carry the migration one-liner
    # (brew uninstall resumer && brew install jin-ttao/tap/resumer).
    #
    # Binaries are adhoc-signed (no Apple notarization), so Gatekeeper
    # SIGKILLs them while the quarantine xattr is present. The postflight
    # hook strips it at install time — without this, every macOS user hits
    # exit 137 on first run.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/resumer"]
          end
